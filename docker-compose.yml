services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: neonfin
      POSTGRES_PASSWORD: neonfin
      POSTGRES_DB: neonfin
    ports:
      - "5432:5432"
    volumes:
      - neonfin-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neonfin"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  neonfin-pgdata:
