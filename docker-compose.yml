services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pay
      POSTGRES_PASSWORD: pay
      POSTGRES_DB: pay
    ports:
      - "5432:5432"
    volumes:
      - pay-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pay"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pay-pgdata:
