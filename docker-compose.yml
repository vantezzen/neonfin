services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pay
      POSTGRES_PASSWORD: pay
      POSTGRES_DB: pay
    ports:
      - "5432:5432"
    volumes:
      - pay-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pay"]
      interval: 5s
      timeout: 5s
      retries: 5

  provider-service:
    profiles: ["secure"]
    build:
      context: .
      dockerfile: Dockerfile.provider-service
    restart: unless-stopped
    environment:
      DATABASE_URL: ${PROVIDER_DATABASE_URL:-postgres://pay:pay@postgres:5432/pay}
      PAY_SECRETS_PROVIDER: ${PAY_SECRETS_PROVIDER:-env}
      PAY_ENCRYPTION_KEY: ${PAY_ENCRYPTION_KEY}
      PAY_PROVIDER_SERVICE_SECRET: ${PAY_PROVIDER_SERVICE_SECRET}
      PAY_PROVIDER_SERVICE_PORT: "3001"
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_TRANSIT_MOUNT: ${VAULT_TRANSIT_MOUNT:-transit}
      VAULT_TRANSIT_KEY: ${VAULT_TRANSIT_KEY:-pay-provider-secrets}
    depends_on:
      postgres:
        condition: service_healthy
    # internal-only: reachable from the web container via the compose network
    expose:
      - "3001"

  web:
    profiles: ["secure"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://pay:pay@postgres:5432/pay}
      PAY_PROVIDER_SERVICE_URL: http://provider-service:3001
      PAY_PROVIDER_SERVICE_SECRET: ${PAY_PROVIDER_SERVICE_SECRET}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      PAY_ALLOW_SIGNUPS: ${PAY_ALLOW_SIGNUPS:-true}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
    depends_on:
      postgres:
        condition: service_healthy
      provider-service:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"

  migrate:
    profiles: ["secure"]
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://pay:pay@postgres:5432/pay}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pay-pgdata:
